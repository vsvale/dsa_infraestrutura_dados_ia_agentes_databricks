resources:
  jobs:
    books_shelves_setup_job:
      name: "Books and Shelves Tables Setup - ${bundle.target}"
      tags:
        Environment: "${bundle.target}"
        Project: "books-shelves-dab"
        CreatedBy: "DAB"
      
      parameters:
        - name: catalog
          default: "${var.catalog_name}"
        - name: schema
          default: "${var.schema_name}"
      
      tasks:
        - task_key: "create_shelves"
          notebook_task:
            notebook_path: "/Shared/.bundle/${bundle.target}/${bundle.name}/notebooks/02_create_shelves.ipynb"
            base_parameters:
              catalog_name: "${var.catalog_name}"
              schema_name: "${var.schema_name}"
          
        - task_key: "create_books"
          depends_on:
            - task_key: "create_shelves"
          notebook_task:
            notebook_path: "/Shared/.bundle/${bundle.target}/${bundle.name}/notebooks/01_create_books.ipynb"
            base_parameters:
              catalog_name: "${var.catalog_name}"
              schema_name: "${var.schema_name}"
      
      git_source:
        git_url: "https://github.com/vsvale/dsa_infraestrutura_dados_ia_agentes_databricks.git"
        git_provider: "gitHub"
        git_branch: "main"
      
      run_as:
        user_name: "viniciusdvale@gmail.com"
      
      queue:
        enabled: false
      
      max_concurrent_runs: 1
      
      timeout_seconds: 3600
