bundle:
  name: books-shelves-dab

include:
  - resources/*.yml

variables:
  warehouse_id:
    description: "SQL Warehouse ID for execution"
    default: "29c4dccd4d8d7e90"
  catalog_name:
    description: "Unity Catalog name"
    default: "dsa"
  schema_name:
    description: "Schema name for tables"
    default: "bronze"

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://dbc-285062b2-ce3e.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.target}/${bundle.name}
    variables:
      catalog_name: "dsa"
      schema_name: "bronze"
      warehouse_id: "29c4dccd4d8d7e90"

  staging:
    presets:
      name_prefix: "stg_"
    workspace:
      host: https://dbc-285062b2-ce3e.cloud.databricks.com
      root_path: /Shared/.bundle/${bundle.target}/${bundle.name}
    variables:
      catalog_name: "dsa"
      schema_name: "silver"
      warehouse_id: "29c4dccd4d8d7e90"

  prod:
    mode: production
    workspace:
      host: https://dbc-285062b2-ce3e.cloud.databricks.com
      root_path: /Shared/.bundle/${bundle.target}/${bundle.name}
    run_as:
      user_name: "viniciusdvale@gmail.com"
    variables:
      catalog_name: "dsa"
      schema_name: "gold"
      warehouse_id: "29c4dccd4d8d7e90"
