name: Lakeflow Pipeline CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Bundle Configuration
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install Databricks CLI
      run: |
        pip install databricks-cli
        
    - name: Validate bundle (dev)
      run: |
        databricks bundle validate -t dev
        
    - name: Validate bundle (staging)
      run: |
        databricks bundle validate -t staging
        
    - name: Validate bundle (prod)
      run: |
        databricks bundle validate -t prod

  test-unit:
    runs-on: ubuntu-latest
    name: Unit Tests
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        pip install pytest pyspark==3.4.0
        
    - name: Run unit tests
      run: |
        pytest tests/unit/ -v
        
    - name: Generate coverage report
      run: |
        pip install pytest-cov
        pytest tests/unit/ --cov=src --cov-report=xml
        
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

  deploy-dev:
    runs-on: ubuntu-latest
    needs: [validate, test-unit]
    if: github.ref == 'refs/heads/develop'
    name: Deploy to Development
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install Databricks CLI
      run: |
        pip install databricks-cli
        
    - name: Deploy to dev
      run: |
        databricks bundle deploy -t dev
        
    - name: Run integration tests
      run: |
        databricks bundle run data_quality_validation -t dev

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [validate, test-unit]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    name: Deploy to Staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install Databricks CLI
      run: |
        pip install databricks-cli
        
    - name: Deploy to staging
      run: |
        databricks bundle deploy -t staging
        
    - name: Run integration tests
      run: |
        databricks bundle run data_quality_validation -t staging
        
    - name: Run pipeline refresh
      run: |
        databricks bundle run pipeline_refresh_job -t staging

  deploy-prod:
    runs-on: ubuntu-latest
    needs: [validate, test-unit]
    if: github.ref == 'refs/heads/main'
    name: Deploy to Production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install Databricks CLI
      run: |
        pip install databricks-cli
        
    - name: Deploy to production
      run: |
        databricks bundle deploy -t prod
        
    - name: Run smoke tests
      run: |
        databricks bundle run data_quality_validation -t prod
        
    - name: Trigger pipeline refresh
      run: |
        databricks bundle run pipeline_refresh_job -t prod

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-staging, deploy-prod]
    if: always()
    name: Notify Results
    
    steps:
    - name: Notify Slack on success
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: success
        channel: '#data-engineering'
        text: '✅ Lakeflow pipeline deployment successful!'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        
    - name: Notify Slack on failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#data-engineering'
        text: '❌ Lakeflow pipeline deployment failed!'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
