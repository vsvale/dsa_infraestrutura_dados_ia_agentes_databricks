bundle:
  name: dsa-pipeline-bundle

include:
  - resources/catalogs.yml

variables:
  base_catalog: "main"
  bronze_schema: "bronze"
  silver_schema: "silver"
  gold_schema: "gold"
  pipeline_name: "dsa_pipeline"

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://dbc-285062b2-ce3e.cloud.databricks.com/
    variables:
      base_catalog: "dev_catalog"
      pipeline_name: ${var.pipeline_name}_dev

  prod:
    mode: production
    workspace:
      host: https://dbc-285062b2-ce3e.cloud.databricks.com/
    run_as:
      service_principal_name: "your-prod-spn"
    variables:
      base_catalog: "prod_catalog"
      pipeline_name: "lakeflow_medallion_pipeline_prod"

sync:
  exclude:
    - ".git/"
    - "tests/"
    - "docs/"
    - "*.md"
    - "__pycache__/"
    - ".pytest_cache/"
